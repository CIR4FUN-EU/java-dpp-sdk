# Pull-only demo runtime for the Fraunhofer GitLab Container Registry.
# Safe defaults are provided so this file can run without an env file.
# If you want overrides, use `--env-file <path-to-your-env-file>`
# or your own `.env` with the same variable names.

services:
  dpp-repo-db:
    # Separate official PostgreSQL container for the repository API.
    # These are safe demo defaults and should be changed for non-demo deployments.
    container_name: dpp-repo-db
    image: postgres:16
    environment:
      POSTGRES_DB: ${MOCK_REPO_POSTGRES_DB:-dpp_repo}
      POSTGRES_USER: ${MOCK_REPO_POSTGRES_USER:-dpp_repo}
      POSTGRES_PASSWORD: ${MOCK_REPO_POSTGRES_PASSWORD:-dpp_repo}
    ports:
      # Host port on the left, internal container port on the right.
      - "${MOCK_REPO_POSTGRES_PORT:-5433}:5432"
    volumes:
      - dpp-repo-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MOCK_REPO_POSTGRES_USER:-dpp_repo} -d ${MOCK_REPO_POSTGRES_DB:-dpp_repo}"]
      interval: 10s
      timeout: 5s
      retries: 5

  dpp-registry-db:
    # Separate official PostgreSQL container for the registry API.
    container_name: dpp-registry-db
    image: postgres:16
    environment:
      POSTGRES_DB: ${MOCK_REGISTRY_POSTGRES_DB:-dpp_registry}
      POSTGRES_USER: ${MOCK_REGISTRY_POSTGRES_USER:-dpp_registry}
      POSTGRES_PASSWORD: ${MOCK_REGISTRY_POSTGRES_PASSWORD:-dpp_registry}
    ports:
      - "${MOCK_REGISTRY_POSTGRES_PORT:-5434}:5432"
    volumes:
      - dpp-registry-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MOCK_REGISTRY_POSTGRES_USER:-dpp_registry} -d ${MOCK_REGISTRY_POSTGRES_DB:-dpp_registry}"]
      interval: 10s
      timeout: 5s
      retries: 5

  dpp-repo-api:
    container_name: dpp-repo-api
    # Registry image variables:
    # - DPP_IMAGE_REGISTRY is the registry image base / namespace path.
    # - DPP_REPO_IMAGE_NAME is the repository API image name.
    # - DPP_IMAGE_TAG defaults to the current safe demo tag.
    image: ${DPP_IMAGE_REGISTRY:-container-registry.gitlab.cc-asp.fraunhofer.de/ipk-gfm/digital-product-passport-sdk/dpp-sdk-platform}/${DPP_REPO_IMAGE_NAME:-dpp-repo-api}:${DPP_IMAGE_TAG:-0.1.0}
    depends_on:
      dpp-repo-db:
        condition: service_healthy
    environment:
      # Exposed host port is mapped below; internal container port stays 8080.
      MOCK_REPO_PORT: ${MOCK_REPO_PORT:-8080}
      DPP_REPO_PORT: ${DPP_REPO_PORT:-8080}
      DPP_REPO_BACKEND: ${DPP_REPO_BACKEND:-postgres}
      # Docker service names must be used here. `localhost` inside the API container
      # would point back to the API container itself, not to PostgreSQL.
      SPRING_DATASOURCE_URL: jdbc:postgresql://dpp-repo-db:5432/${MOCK_REPO_POSTGRES_DB:-dpp_repo}
      SPRING_DATASOURCE_USERNAME: ${MOCK_REPO_POSTGRES_USER:-dpp_repo}
      SPRING_DATASOURCE_PASSWORD: ${MOCK_REPO_POSTGRES_PASSWORD:-dpp_repo}
    ports:
      - "${MOCK_REPO_PORT:-8080}:${MOCK_REPO_PORT:-8080}"

  dpp-registry-api:
    container_name: dpp-registry-api
    # Registry API image path. Override through DPP_IMAGE_REGISTRY,
    # DPP_REGISTRY_IMAGE_NAME, or DPP_IMAGE_TAG in an env file if needed.
    image: ${DPP_IMAGE_REGISTRY:-container-registry.gitlab.cc-asp.fraunhofer.de/ipk-gfm/digital-product-passport-sdk/dpp-sdk-platform}/${DPP_REGISTRY_IMAGE_NAME:-dpp-registry-api}:${DPP_IMAGE_TAG:-0.1.0}
    depends_on:
      dpp-repo-api:
        condition: service_started
      dpp-registry-db:
        condition: service_healthy
    environment:
      MOCK_REPO_PORT: ${MOCK_REPO_PORT:-8080}
      DPP_REPO_PORT: ${DPP_REPO_PORT:-8080}
      MOCK_REGISTRY_PORT: ${MOCK_REGISTRY_PORT:-8081}
      DPP_REGISTRY_PORT: ${DPP_REGISTRY_PORT:-8081}
      DPP_REGISTRY_BACKEND: ${DPP_REGISTRY_BACKEND:-postgres}
      # This is the public repo URL that a host-side client can put into the registration payload.
      DEMO_REPO_PUBLIC_BASE_URL: ${DEMO_REPO_PUBLIC_BASE_URL:-http://localhost:${MOCK_REPO_PORT:-8080}}
      # This is the internal repo-verification URL used by the registry container.
      # It must use the Compose service hostname, never localhost.
      DEMO_REPO_VERIFICATION_BASE_URL: ${DEMO_REPO_VERIFICATION_BASE_URL:-http://dpp-repo-api:${MOCK_REPO_PORT:-8080}}
      # There is no repo->registry callback configured by this demo app.
      # The implemented container-to-container integration is registry->repo verification.
      SPRING_DATASOURCE_URL: jdbc:postgresql://dpp-registry-db:5432/${MOCK_REGISTRY_POSTGRES_DB:-dpp_registry}
      SPRING_DATASOURCE_USERNAME: ${MOCK_REGISTRY_POSTGRES_USER:-dpp_registry}
      SPRING_DATASOURCE_PASSWORD: ${MOCK_REGISTRY_POSTGRES_PASSWORD:-dpp_registry}
    ports:
      # Host port on the left, internal registry container port on the right.
      - "${MOCK_REGISTRY_PORT:-8081}:${MOCK_REGISTRY_PORT:-8081}"

volumes:
  # Named volumes keep safe demo database state until `docker compose down -v`.
  dpp-repo-db-data:
  dpp-registry-db-data:
