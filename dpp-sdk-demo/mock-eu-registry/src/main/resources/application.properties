spring.config.import=optional:file:.env[.properties]
server.port=${MOCK_REGISTRY_PORT:${DPP_REGISTRY_PORT:8081}}
demo.repo.public-base-url=http://localhost:${MOCK_REPO_PORT:${DPP_REPO_PORT:8080}}
demo.repo.verification-base-url=${DEMO_REPO_VERIFICATION_BASE_URL:${demo.repo.public-base-url}}
spring.application.name=mock-eu-registry
spring.main.banner-mode=off
logging.level.root=INFO
logging.level.org.springframework=INFO
debug=false
dpp.registry.backend=${DPP_REGISTRY_BACKEND:memory}
spring.datasource.url=${SPRING_DATASOURCE_URL:}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
